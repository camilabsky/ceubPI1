services:
  db:
    build: ./db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: horta
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -u user -ppassword -D horta -e 'SELECT 1 FROM RecompensasDisponiveis LIMIT 1'"]
      interval: 60s
      timeout: 30s
      retries: 50
  frontend:
    build: ./frontend        
    ports:            
      - "3000:3000"        
  backend:
    build: ./backend        
    ports:            
      - "8080:8080"
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true

